name: Market Gauntlet — Mid-day Bot

on:
  schedule:
    # 12:30pm ET weekdays
    # EST = UTC-5 → 17:30 UTC | EDT = UTC-4 (summer) → 16:30 UTC
    - cron: '30 17 * * 1-5'

  # Manual trigger — use this to test anytime from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  midday-scan:
    name: Mid-day Evaluation + Fill Slots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run mid-day bot
        run: node evaluate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
